<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dfb674"/>
      <stop offset="100%" style="stop-color:#c29f64"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#121212"/>
  <!-- Decorative ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.3"/>
  <!-- Open book -->
  <g transform="translate(256, 280)">
    <!-- Left page -->
    <path d="M-10,-80 Q-100,-90 -120,-40 L-120,60 Q-100,50 -10,60 Z" fill="url(#gold)" opacity="0.9"/>
    <!-- Right page -->
    <path d="M10,-80 Q100,-90 120,-40 L120,60 Q100,50 10,60 Z" fill="url(#gold)" opacity="0.9"/>
    <!-- Spine -->
    <path d="M-10,-80 L-10,60 L10,60 L10,-80 Q0,-90 -10,-80" fill="#8b7355"/>
    <!-- Page lines left -->
    <line x1="-95" y1="-30" x2="-25" y2="-30" stroke="#121212" stroke-width="3" opacity="0.3"/>
    <line x1="-95" y1="-5" x2="-25" y2="-5" stroke="#121212" stroke-width="3" opacity="0.3"/>
    <line x1="-95" y1="20" x2="-25" y2="20" stroke="#121212" stroke-width="3" opacity="0.3"/>
    <!-- Page lines right -->
    <line x1="95" y1="-30" x2="25" y2="-30" stroke="#121212" stroke-width="3" opacity="0.3"/>
    <line x1="95" y1="-5" x2="25" y2="-5" stroke="#121212" stroke-width="3" opacity="0.3"/>
    <line x1="95" y1="20" x2="25" y2="20" stroke="#121212" stroke-width="3" opacity="0.3"/>
  </g>
  <!-- Star/Islamic pattern above book -->
  <g transform="translate(256, 140)">
    <polygon points="0,-35 8,-10 35,-10 14,5 22,30 0,15 -22,30 -14,5 -35,-10 -8,-10" fill="url(#gold)" opacity="0.8"/>
  </g>
</svg>
